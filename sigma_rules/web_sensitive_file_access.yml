title: Sensitive/Hidden File Access Attempt
id: c3d4e5f6-1234-4567-8901-abcdef123458
status: stable
description: Detects attempts to access sensitive configuration or version control files.
author: Movlud Mirzazade (SOC Analyst)
date: 2026/04/29
logsource:
    category: webserver
detection:
    selection:
        c_uri|contains:
            - '/.env'
            - '/.git/'
            - '/.aws/'
            - 'wp-config.php'
            - 'web.config'
            - 'id_rsa'
    condition: selection
level: medium
tags:
    - attack.discovery
